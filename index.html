<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        h1 { color: #e11d48; margin-bottom: 25px; }
        
        /* The Card */
        .card { background-color: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        
        /* Inputs and Button */
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #e11d48; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        
        /* Output area */
        #chatLog { margin-top: 20px; padding: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; min-height: 150px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>PAYNE HUB</h1>
    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste API Key">
        <input type="text" id="prompt" placeholder="Ask anything...">
        <button onclick="ask()">SEND</button>
        <div id="chatLog">AI output will appear here...</div>
    </div>
</div>

<script>
    async function ask() {
        const key = document.getElementById('apiKey').value;
        const text = document.getElementById('prompt').value;
        const log = document.getElementById('chatLog');
        
        log.innerText = "Thinking...";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await response.json();
            if (data.candidates) {
                log.innerText = data.candidates[0].content.parts[0].text;
            } else {
                log.innerText = "Error: " + JSON.stringify(data.error.message);
            }
        } catch (e) {
            log.innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>
