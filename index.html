<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Title at the top */
        h1 { color: #e11d48; margin-bottom: 20px; font-size: 24px; }
        
        /* The main container card */
        .card { background-color: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 500px; }
        
        /* Input styling */
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        
        /* The Red Send Button */
        button { width: 100%; padding: 12px; background-color: #e11d48; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        /* The output box inside the card */
        #chatLog { padding: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; min-height: 150px; text-align: left; color: #c9d1d9; font-size: 14px; overflow-wrap: break-word; }
    </style>
</head>
<body>

    <h1>PAYNE HUB</h1>

    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste API Key">
        <input type="text" id="prompt" placeholder="HOW ARE YOU">
        <button onclick="ask()">SEND</button>
        <div id="chatLog">Error: "models/gemini-1.5-flash is not found for API version v1beta...</div>
    </div>

    <script>
        // Placeholder logic - we will fix the connection in the next step
        function ask() {
            document.getElementById('chatLog').innerText = "Connecting...";
        }
    </script>
</body>
</html>
