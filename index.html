<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #e11d48; margin-bottom: 20px; font-size: 24px; }
        .card { background-color: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 500px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        
        /* New Layout for Tools */
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .tool-btn { background: #30363d; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; }
        
        button { width: 100%; padding: 12px; background-color: #e11d48; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        #chatLog { margin-top: 15px; padding: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; min-height: 150px; text-align: left; }
    </style>
</head>
<body>

    <h1>PAYNE HUB</h1>

    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste API Key">
        
        <div class="toolbar">
            <button class="tool-btn" onclick="document.getElementById('fileInput').click()">+ Image</button>
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="tool-btn" onclick="startVoice()">🎤 Voice</button>
            <button class="tool-btn" onclick="document.getElementById('cameraInput').click()">📷 Camera</button>
            <input type="file" id="cameraInput" hidden accept="image/*" capture="environment">
        </div>

        <input type="text" id="prompt" placeholder="Ask anything...">
        <button onclick="ask()">SEND</button>
        <div id="chatLog">Waiting for input...</div>
    </div>

    <script>
        // Voice Recognition API
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (event) => {
                document.getElementById('prompt').value = event.results[0][0].transcript;
            };
            recognition.start();
        }

        function ask() {
            document.getElementById('chatLog').innerText = "Processing...";
            // Logic to connect to API goes here
        }
    </script>
</body>
</html>
