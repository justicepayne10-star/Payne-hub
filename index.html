<script>
    // 1. Sidebar Navigation Function
    function switchView(viewName) {
        const log = document.getElementById('chatLog');
        log.innerHTML = `<h3>${viewName.charAt(0).toUpperCase() + viewName.slice(1)}</h3><p>This section is currently being configured.</p>`;
    }

    // 2. API Communication Function
    async function ask() {
        const key = document.getElementById('apiKey').value;
        const text = document.getElementById('prompt').value;
        const log = document.getElementById('chatLog');
        
        if (!key) { alert("Please enter your API Key!"); return; }
        
        log.innerHTML += `<p><b>You:</b> ${text}</p>`;
        
        // Using the models list endpoint to diagnose the 404 error
        const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.models) {
                // SUCCESS: Displays what your key can actually access
                const models = data.models.map(m => m.name).join(', ');
                log.innerHTML += `<p style="color:green;"><b>Connected! Available Models:</b> ${models}</p>`;
                log.innerHTML += `<p>Copy one of these names and use it in your URL.</p>`;
            } else {
                // FAILURE: Displays the exact error from Google
                log.innerHTML += `<p style="color:red;"><b>Error:</b> ${JSON.stringify(data.error?.message || data)}</p>`;
            }
        } catch (e) {
            log.innerHTML += `<p style="color:red;"><b>Connection Error:</b> ${e.message}</p>`;
        }
    }
</script>
</body>
</html>
