<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAYNE HUB</title>
</head>
<body style="margin:0; background:#0f172a; color:white; font-family:sans-serif;">

    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; justify-content:center; align-items:center; z-index:9999;">
        <h2 style="color:#dc2626;">LOADING PAYNE HUB...</h2>
    </div>

    <div id="gateway" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9998; justify-content:center; align-items:center;">
        <div style="background:#1e293b; padding:20px; border-radius:10px; width:80%; max-width:300px; text-align:center;">
            <h3>Admin Access</h3>
            <input type="password" id="code" placeholder="Code" style="width:100%; padding:8px; margin-bottom:10px;">
            <button onclick="check()" style="width:100%; padding:10px; background:#dc2626; border:none; color:white;">Enter</button>
            <p onclick="closeGateway()" style="margin-top:15px; color:#dc2626; cursor:pointer;">Continue as Guest</p>
        </div>
    </div>

    <div style="padding:20px; text-align:center;">
        <h1>⚡ PAYNE HUB ⚡</h1>
        <p>System Online.</p>
    </div>

    <script>
        // Simple, error-proof logic
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('gateway').style.display = 'flex';
            }, 1000);
        };

        function check() {
            if(document.getElementById('code').value === "12345") {
                alert("Admin Access Granted");
                closeGateway();
            } else {
                alert("Proceeding as Guest");
                closeGateway();
            }
        }

        function closeGateway() {
            document.getElementById('gateway').style.display = 'none';
        }
    </script>
</body>
</html>
