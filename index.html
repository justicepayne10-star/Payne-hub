<!DOCTYPE html>
<html lang="en">
<body>
    <h1>PAYNE HUB</h1>
    <div id="chatLog" style="height: 200px; border: 1px solid black; overflow-y: scroll;"></div>
    <input type="password" id="apiKeyInput" placeholder="Paste your API Key here">
    <input type="text" id="userInput" placeholder="Ask anything...">
    <button onclick="askAI()">SEND</button>

    <script>
        async function askAI() {
            const API_KEY = document.getElementById('apiKeyInput').value;
            const input = document.getElementById('userInput').value;
            const chatLog = document.getElementById('chatLog');
            
            chatLog.innerHTML += `<p>You: ${input}</p>`;
            
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "contents": [{ "parts": [{ "text": input }] }] })
            });
            
            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            chatLog.innerHTML += `<p>AI: ${aiReply}</p>`;
        }
    </script>
</body>
</html>
