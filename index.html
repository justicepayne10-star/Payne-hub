<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        /* 1. Global Setup (Modern Dark Mode) */
        body { margin: 0; background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        /* 2. Main Wrapper */
        .hub-container { width: 100%; max-width: 600px; }

        /* 3. Header Styling */
        .brand { text-align: center; padding: 20px 0; color: #ff3e3e; letter-spacing: 2px; font-weight: 800; font-size: 2rem; }

        /* 4. The "Card" Look */
        .card { background: #111111; padding: 25px; border: 1px solid #222; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        /* 5. Inputs & Buttons */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff3e3e; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d32f2f; }

        /* 6. Conversation Area */
        .output-box { background: #0a0a0a; padding: 20px; border-radius: 12px; height: 300px; border: 1px solid #222; overflow-y: auto; color: #aaa; }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="brand">PAYNE HUB</div>

        <div class="card">
            <input type="password" placeholder="API Key">
            <input type="text" placeholder="Ask anything...">
            <button>SEND</button>
        </div>

        <div class="card output-box">
            AI output will appear here...
        </div>
    </div>

</body>
</html>
