<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAYNE HUB</title>
</head>
<body>
    <h1>PAYNE HUB</h1>
    <input type="password" id="apiKeyInput" placeholder="Paste API Key">
    <input type="text" id="userInput" placeholder="Ask anything">
    <button onclick="askAI()">SEND</button>
    <div id="chatLog"></div>

    <script>
        async function askAI() {
            const API_KEY = document.getElementById('apiKeyInput').value;
            const input = document.getElementById('userInput').value;
           const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "contents": [{ "parts": [{ "text": input }] }] })
                });
                const data = await response.json();
                document.getElementById('chatLog').innerText = data.candidates[0].content.parts[0].text;
            } catch (err) {
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
