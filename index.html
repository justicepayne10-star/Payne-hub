<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        h1 { color: #e11d48; margin: 40px 0; font-size: 2rem; font-weight: 700; }

        .card { 
            background-color: #161b22; 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid #30363d; 
            width: 90%; 
            max-width: 600px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        input[type="password"], input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; 
        }

        .toolbar { display: flex; gap: 10px; margin-bottom: 12px; }
        
        .tool-btn { 
            background: #21262d; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            flex: 1; 
            font-weight: 500; 
        }

        button.send-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: #e11d48; 
            border: none; 
            border-radius: 6px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 15px; 
        }

        #chatLog { 
            padding: 15px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            min-height: 200px; 
            text-align: left; 
            color: #c9d1d9; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

    <h1>PAYNE HUB</h1>

    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste API Key">
        
        <div class="toolbar">
            <button class="tool-btn">+ Image</button>
            <button class="tool-btn">🎤 Voice</button>
            <button class="tool-btn">📷 Camera</button>
        </div>

        <input type="text" id="prompt" placeholder="HOW ARE YOU">
        <button class="send-btn" onclick="ask()">SEND</button>
        
        <div id="chatLog">Waiting for input...</div>
    </div>

    <script>
        function ask() {
            document.getElementById('chatLog').innerText = "Processing...";
        }
    </script>
</body>
</html>
