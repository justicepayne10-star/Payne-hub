<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB</title>
    <style>
        /* Force body to fill the entire browser screen */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0d1117; 
            color: white; 
            font-family: sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        
        /* Container fills the width and height */
        .hub-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        
        h1 { color: #e11d48; margin: 10px 0; text-align: center; }

        /* Card expands to fill available space */
        .card { 
            flex-grow: 1; 
            background-color: #161b22; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #30363d; 
            display: flex; 
            flex-direction: column; 
        }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .tool-btn { background: #30363d; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; flex: 1; }
        
        button { width: 100%; padding: 15px; background-color: #e11d48; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        
        #chatLog { 
            flex-grow: 1; 
            margin-top: 20px; 
            padding: 20px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            overflow-y: auto; 
        }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>PAYNE HUB</h1>
    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste API Key">
        <div class="toolbar">
            <button class="tool-btn" onclick="alert('Image feature')">+ Image</button>
            <button class="tool-btn" onclick="startVoice()">🎤 Voice</button>
            <button class="tool-btn" onclick="alert('Camera feature')">📷 Camera</button>
        </div>
        <input type="text" id="prompt" placeholder="Ask anything...">
        <button onclick="ask()">SEND</button>
        <div id="chatLog">Waiting for input...</div>
    </div>
</div>

<script>
    // ... (Keep your existing ask() and startVoice() functions here)
</script>
</body>
</html>
