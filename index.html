<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYNE HUB - Interface Foundation</title>
</head>
<body id="appBody" style="font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0;">

    <header style="background-color: #dc2626; padding: 30px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <h1 style="margin: 0; font-size: 40px; letter-spacing: 2px; font-weight: 900;">⚡ PAYNE HUB ⚡</h1>
        <p style="margin: 10px 0 20px 0; color: #fee2e2; font-size: 15px; opacity: 0.9;">The Vault Architecture: v5.2.0 | Foundation Phase</p>
        
        <input type="text" id="storeSearchInput" onkeyup="filterCatalog()" placeholder="🔍 Interface Search..." style="width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 30px; border: none; outline: none; text-align: center;">
    </header>

    <nav id="navBar" style="background-color: #1e293b; display: flex; justify-content: center; gap: 15px; padding: 15px; border-bottom: 3px solid #334155;">
        <button onclick="switchCategory('ALL')" style="padding: 10px 20px; border-radius: 25px; border: none; background: #ef4444; color: white; font-weight: bold; cursor: pointer;">All Collective</button>
        <button onclick="switchCategory('GAME')" style="padding: 10px 20px; border-radius: 25px; border: none; background: #334155; color: #cbd5e1; font-weight: bold; cursor: pointer;">Games</button>
        <button onclick="switchCategory('APP')" style="padding: 10px 20px; border-radius: 25px; border: none; background: #334155; color: #cbd5e1; font-weight: bold; cursor: pointer;">Social Apps</button>
        <button onclick="switchCategory('MUSIC')" style="padding: 10px 20px; border-radius: 25px; border: none; background: #334155; color: #cbd5e1; font-weight: bold; cursor: pointer;">Music Lib</button>
    </nav>

    <main style="padding: 20px; max-width: 1200px; margin: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 id="categoryLabel" style="margin: 0; color: #f87171;">System Repository</h2>
            <div id="statusBadge" style="background: #10b981; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px;">READY</div>
        </div>
        <div id="catalogGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            </div>
    </main>

    <script>
        // Database Initialization
        const database = [
            { type: "GAME", title: "DLS 2026", desc: "Football Simulation Core" },
            { type: "APP", title: "TikTok Pro", desc: "Media Streaming Engine" },
            { type: "MUSIC", title: "Studio Master Vol 1", desc: "High-Fidelity Audio" }
        ];

        function renderGrid(filter = "ALL") {
            const grid = document.getElementById("catalogGrid");
            const label = document.getElementById("categoryLabel");
            grid.innerHTML = "";
            
            const filtered = (filter === "ALL") ? database : database.filter(i => i.type === filter);
            
            filtered.forEach(item => {
                const card = document.createElement("div");
                card.style = "background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155;";
                card.innerHTML = `
                    <h3 style="margin: 0 0 10px 0; color: #fff;">${item.title}</h3>
                    <p style="margin: 0 0 15px 0; font-size: 13px; color: #94a3b8;">${item.desc}</p>
                    <div style="padding: 8px; background: #0f172a; border-radius: 6px; text-align: center; color: #f87171; font-weight: bold; font-size: 12px;">PREPARED</div>
                `;
                grid.appendChild(card);
            });
            label.innerText = filter + " Repository";
        }

        function switchCategory(cat) { renderGrid(cat); }
        renderGrid(); // Initial Load
    </script>
</body>
</html>
