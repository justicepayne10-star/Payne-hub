<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAYNE HUB - Premium Portal</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: #fff; font-family: sans-serif; }
        /* Splash Screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        /* Gateway */
        #gateway { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9998; justify-content: center; align-items: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; border: 2px solid #dc2626; }
    </style>
</head>
<body>

    <div id="loader"><h2>⚡ LOADING PAYNE HUB...</h2></div>

    <div id="gateway">
        <div class="card">
            <h3>System Gateway</h3>
            <input type="password" id="adminCode" placeholder="Admin Number" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none; box-sizing:border-box;">
            <button onclick="checkAdmin()" style="width:100%; padding:10px; background:#dc2626; border:none; color:white; font-weight:bold; cursor:pointer;">ENTER</button>
            <p onclick="closeGateway()" style="cursor:pointer; font-size:12px; color:#dc2626; margin-top:15px; text-decoration:underline;">Continue as Guest</p>
        </div>
    </div>

    <header style="background: #dc2626; padding: 20px; text-align: center;"><h1>⚡ PAYNE HUB ⚡</h1></header>
    <main style="padding: 20px; text-align: center;">
        <div id="appContainer" style="background:#1e293b; padding:20px; border-radius:10px;">
            <h3>Welcome to the Vault</h3>
            <p>Accessing secure infrastructure.</p>
        </div>
    </main>

    <script>
        // Trigger sequence
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('gateway').style.display = 'flex';
            }, 1500);
        };

        function checkAdmin() {
            const code = document.getElementById('adminCode').value;
            if(code === "12345") {
                alert("Welcome, Admin.");
                closeGateway();
            } else {
                alert("Proceeding as Guest.");
                closeGateway();
            }
        }

        function closeGateway() {
            document.getElementById('gateway').style.display = 'none';
        }
    </script>
</body>
</html>
